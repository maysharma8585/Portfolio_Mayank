name: Deploy Resume to GitHub Pages

on:
  push:
    branches:
      - main   # change if your branch is different

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Upload artifact for GitHub Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: .   # 👈 your resume files (HTML/CSS etc.)

  deploy:
    needs: build
    runs-on: ubuntu-latest

    environment:
      name: github-pages   # 👈 THIS FIXES YOUR ERROR

    permissions:
      pages: write
      id-token: write

    steps:
      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
